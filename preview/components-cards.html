<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; background: #FAFAFA; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card {
    background: #fff; border-radius: 10px; border: 1px solid #E4E4E4;
    box-shadow: 0 1px 2px 0 rgba(13,32,67,0.05);
    padding: 16px;
  }
  .card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .card p  { font-size: 13px; color: #4D4D4D; }
  .row { display:flex; align-items:center; gap: 12px; }
  .avatar { width: 32px; height: 32px; border-radius: 99px; background: #0D2043; color: #fff; display:flex; align-items:center; justify-content:center; font-size: 13px; font-weight: 600; }
  .meta { display:flex; flex-direction: column; gap: 2px; }
  .meta .n { font-size: 14px; font-weight: 600; }
  .meta .s { font-size: 12px; color: #4D4D4D; }
  .card.hero { grid-column: 1 / -1; border-radius: 16px; background: linear-gradient(180deg, #FFFFFF 0%, #F2F0FF 100%); border-color: transparent; }
  .badge { display:inline-flex; align-items:center; height: 22px; padding: 0 10px; border-radius:99px; font-size: 12px; font-weight: 500; background: rgba(18,191,165,0.14); color: #0B8F7A; gap: 6px; }
  .badge .dot { width: 6px; height:6px; border-radius: 99px; background: #12BFA5; }
</style>
</head>
<body>
<div class="grid">
  <div class="card hero">
    <h3 style="font-size:18px">12 appointments today</h3>
    <p>3 are within the next hour · 2 need confirmation</p>
  </div>
  <div class="card">
    <div class="row">
      <div class="avatar">KA</div>
      <div class="meta">
        <span class="n">Khaled Al-Saud</span>
        <span class="s">+966 5X XXX XXXX</span>
      </div>
      <span class="badge" style="margin-inline-start:auto"><span class="dot"></span>Confirmed</span>
    </div>
  </div>
  <div class="card">
    <h3>Dental cleaning</h3>
    <p>Tuesday, 14 May · 10:30 AM · Dr Yusra</p>
  </div>
</div>
</body>
</html>
