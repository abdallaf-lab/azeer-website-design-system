<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; }
  .card-wrap { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; }
  .swatch {
    flex: 1; height: 88px; border-radius: var(--radius);
    padding: 10px 12px; display:flex; flex-direction:column; justify-content: space-between;
    border: 1px solid transparent;
  }
  .name { font-size: 12px; font-weight: 600; line-height: 1; }
  .hex { font-size: 10px; font-family: var(--font-mono); opacity: 0.85; }
  .label-row { display:flex; justify-content: space-between; align-items:baseline; }
  .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; opacity: 0.7; }
  .caption { color: var(--muted-foreground); font-size: 12px; }
</style>
</head>
<body>
<div class="card-wrap">
  <div class="label-row"><span class="tag">Semantic</span><span class="caption">Status &amp; feedback</span></div>
  <div class="row">
    <div class="swatch" style="background:#12BFA5;color:#fff;"><span class="name">success</span><span class="hex">#12bfa5</span></div>
    <div class="swatch" style="background: rgb(245, 158, 11); color: #0D2043"><span class="name">warning</span><span class="hex">#f59e0b</span></div>
    <div class="swatch" style="background:#E60006;color:#fff;"><span class="name">destructive</span><span class="hex">#e60006</span></div>
    <div class="swatch" style="background: rgb(242, 240, 255); color: rgb(13, 32, 67)"><span class="name">info</span><span class="hex">#F2F0FF</span></div>
    <div class="swatch" style="background:#CDDAFD;color:#0D2043;"><span class="name">ring</span><span class="hex">#CDDAFD</span></div>
  </div>
</div>
</body>
</html>
