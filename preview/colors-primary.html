<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: var(--background); }
  body { padding: 20px; }
  .card-wrap { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .swatch {
    flex: 1; height: 92px; border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 10px 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .swatch .name { font-size: 12px; font-weight: 600; line-height: 1; }
  .swatch .hex { font-size: 11px; opacity: 0.75; font-family: var(--font-mono); letter-spacing: 0; }
  .label-row { display:flex; justify-content: space-between; align-items:baseline; }
  .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7; font-weight: 600; }
  .caption { color: var(--muted-foreground); font-size: 12px; }
</style>
</head>
<body>
<div class="card-wrap">
  <div class="label-row">
    <span class="tag">Brand · Primary</span>
    <span class="caption">LIGHT · DARK</span>
  </div>
  <div class="row">
    <div class="swatch" style="background:#7C64FE;color:#F5F5F5;">
      <span class="name">primary</span>
      <span class="hex">#7C64FE</span>
    </div>
    <div class="swatch" style="background: #9B85FF; color: rgb(13, 32, 67)">
      <span class="name">primary · dark</span>
      <span class="hex">#9B85FF</span>
    </div>
    <div class="swatch" style="background:#0D2043;color:#F5F5F5;">
      <span class="name">secondary · navy</span>
      <span class="hex">#0D2043</span>
    </div>
    <div class="swatch" style="background:#F2F0FF;color:#7C64FE;border-color:#E4E4E4;">
      <span class="name">accent · lavender</span>
      <span class="hex">#F2F0FF</span>
    </div>
    <div class="swatch" style="background: #1F1A3A; color: rgb(253, 253, 253)">
      <span class="name">accent · dark</span>
      <span class="hex">#1F1A3A</span>
    </div>
  </div>
</div>
</body>
</html>
