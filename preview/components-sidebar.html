<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 0; background: #F5F5F5; }
  .wrap { display:grid; grid-template-columns: 240px 1fr; height: 100%; min-height: 320px; }
  .sidebar {
    background: #0D2043; color: #F5F5F5; padding: 16px 10px; font-size: 14px;
    display:flex; flex-direction: column; gap: 2px;
  }
  .brand { display:flex; align-items:center; gap: 10px; padding: 6px 10px 14px 10px; }
  .brand .logo { width: 28px; height: 28px; border-radius: 8px; background: #7C64FE; display:flex; align-items:center; justify-content:center; font-weight: 700; color:#fff; font-size: 14px; }
  .brand .name { font-size: 15px; font-weight: 600; }
  .item {
    display:flex; align-items:center; gap: 10px; padding: 8px 10px; border-radius: 6px;
    color: rgba(245,245,245,0.78); cursor: pointer;
    font-size: 14px;
  }
  .item:hover { background: #1B2F53; color: #fff; }
  .item.active { background: #7C64FE; color: #fff; }
  .item .ico { width: 16px; height: 16px; border: 1.5px solid currentColor; border-radius: 4px; opacity: 0.9; }
  .item .count { margin-inline-start: auto; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.14); border-radius: 99px; padding: 2px 8px; }
  .section { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(245,245,245,0.45); padding: 16px 10px 6px; font-weight: 600; }
  .body { padding: 16px; color: #8A8F98; font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">A</div>
      <div class="name">Azeer</div>
    </div>
    <div class="item active"><span class="ico"></span>Inbox <span class="count">24</span></div>
    <div class="item"><span class="ico"></span>Calendar</div>
    <div class="item"><span class="ico"></span>Campaigns</div>
    <div class="item"><span class="ico"></span>Contacts</div>
    <div class="item"><span class="ico"></span>Analytics</div>
    <div class="section">Voice</div>
    <div class="item"><span class="ico"></span>Call log</div>
    <div class="item"><span class="ico"></span>Voicemail <span class="count">3</span></div>
    <div class="item"><span class="ico"></span>IVR</div>
  </aside>
  <main class="body">Agent Console sidebar is navy in both light &amp; dark mode · 240px fixed · purple active state</main>
</div>
</body>
</html>
