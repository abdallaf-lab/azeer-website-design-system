<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; }
  .row { display: flex; align-items: baseline; gap: 20px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .label { width: 140px; font-size: 11px; font-family: var(--font-mono); color: var(--muted-foreground); }
  .meta  { margin-inline-start: auto; font-size: 11px; color: var(--muted-foreground); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row"><span class="label">Display-L</span><span class="text-display-lg">Azeer</span><span class="meta">64 / 64 · 500</span></div>
  <div class="row"><span class="label">Display</span><span class="text-display">Send a broadcast</span><span class="meta">48 / 48 · 500</span></div>
  <div class="row"><span class="label">H1</span><span class="text-h1">Agent Inbox</span><span class="meta">32 / 36 · 500</span></div>
  <div class="row"><span class="label">H2</span><span class="text-h2">Conversations today</span><span class="meta">24 / 32 · 500</span></div>
  <div class="row"><span class="label">H3</span><span class="text-h3">Upcoming appointments</span><span class="meta">20 / 27 · 600</span></div>
</body>
</html>
