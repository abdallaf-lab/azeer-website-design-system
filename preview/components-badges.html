<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    height: 22px; padding: 0 10px; border-radius: 9999px;
    font-size: 12px; font-weight: 500;
  }
  .badge .dot { width: 6px; height: 6px; border-radius: 99px; }
  .b-success { background: rgba(18,191,165,0.14); color: #0B8F7A; }
  .b-warning { background: rgba(254,179,67,0.18); color: #A5691A; }
  .b-destr   { background: rgba(230,0,6,0.10); color: #B5000B; }
  .b-info    { background: rgba(0,188,255,0.14); color: #006F96; }
  .b-muted   { background: #F5F5F5; color: #4D4D4D; }
  .b-primary { background: #F2F0FF; color: #7C64FE; }
  .b-whats   { background: rgba(37,211,102,0.14); color: #1A8D46; }
  .status-dot { width: 8px; height: 8px; border-radius: 99px; }
  .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7; font-weight: 600; display:block; margin-bottom: 10px; }
</style>
</head>
<body>
<span class="tag">Badges · status, channel, count</span>
<div class="row">
  <span class="badge b-success" style="background-color: rgb(230, 244, 234); color: rgb(30, 142, 62)"><span class="dot" style="background:#12BFA5"></span>Confirmed</span>
  <span class="badge b-warning" style="background-color: rgb(254, 247, 224); color: rgb(176, 96, 0)"><span class="dot" style="background:#FEB343"></span>Pending</span>
  <span class="badge b-destr" style="background-color: rgb(252, 232, 230); color: rgb(197, 34, 31)"><span class="dot" style="background:#E60006"></span>Failed</span>
  <span class="badge b-info" style="background-color: rgb(123, 97, 255); color: rgb(255, 255, 255); font-family: Inter"><span class="dot" style="background:#00BCFF"></span>New</span>
  <span class="badge b-muted" style="background-color: rgb(241, 243, 244); color: rgb(95, 99, 104)">Archived</span>
  <span class="badge b-primary" style="background-color: rgb(236, 233, 248); color: rgb(123, 97, 255)">Draft</span>
  <span class="badge b-whats" style="background-color: rgb(234, 250, 241); color: rgb(39, 174, 96)"><span class="dot" style="background:#25D366"></span>WhatsApp</span>
  <span class="badge" style="background:#0D2043;color:#fff;">12</span>
  <span class="badge" style="background:#E60006;color:#fff;">99+</span>
</div>
<div style="height:16px"></div>
<span class="tag">Voice state dots</span>
<div class="row">
  <span class="status-dot azeer-pulse" style="background:#E5484D"></span><span style="font-size:13px">recording</span>
  <span class="status-dot" style="background:#12BFA5;margin-inline-start:16px"></span><span style="font-size:13px">on call</span>
  <span class="status-dot azeer-pulse" style="background:#FEB343;margin-inline-start:16px"></span><span style="font-size:13px">ringing</span>
</div>
</body>
</html>
