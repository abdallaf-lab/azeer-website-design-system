<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  body { padding: 20px; background: #F5F5F5; }
  .bar {
    display:flex; align-items:center; gap: 16px; padding: 12px 16px;
    background: rgba(13,32,67,0.92); backdrop-filter: blur(16px) saturate(180%);
    border-radius: 12px; color: #fff; box-shadow: 0 4px 6px -1px rgba(13,32,67,0.10), 0 2px 4px -2px rgba(13,32,67,0.08);
  }
  .bar .status { display:flex; align-items:center; gap: 8px; font-size: 13px; font-weight: 500; }
  .bar .dot { width: 8px; height: 8px; border-radius: 99px; background: #00BC7C; }
  .name { font-size: 14px; font-weight: 600; }
  .timer { font-family: var(--font-mono); font-size: 13px; font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.75); }
  .actions { margin-inline-start: auto; display:flex; gap: 8px; }
  .a-btn {
    width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer;
    background: rgba(255,255,255,0.08); color:#fff; display:flex; align-items:center; justify-content:center;
    transition: background 120ms ease;
  }
  .a-btn:hover { background: rgba(255,255,255,0.16); }
  .a-btn svg { width: 16px; height: 16px; }
  .a-btn.red { background: #E60006; }
  .wave { display:flex; gap: 2px; align-items:end; height: 20px; }
  .wave span { display:block; width: 3px; background: #9B85FF; border-radius: 2px; animation: pulse 1.5s infinite cubic-bezier(0.87,0,0.13,1); }
  @keyframes pulse {
    0%, 100% { height: 20%; opacity:.6; }
    50% { height: 100%; opacity:1; }
  }
  .wave span:nth-child(2) { animation-delay: 0.1s; }
  .wave span:nth-child(3) { animation-delay: 0.2s; }
  .wave span:nth-child(4) { animation-delay: 0.3s; }
  .wave span:nth-child(5) { animation-delay: 0.4s; }
  .tag { font-size: 10px; text-transform: uppercase; letter-spacing:0.06em; opacity:0.7; font-weight:600; display:block; margin-bottom: 10px; }
</style>
</head>
<body>
<span class="tag">Call Bar · on-call · frosted navy · voice is purple</span>
<div class="bar">
  <div class="status"><span class="dot"></span>On call</div>
  <div>
    <div class="name">Khaled Al-Saud</div>
    <div class="timer">02:43</div>
  </div>
  <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
  <div class="actions">
    <button class="a-btn" aria-label="Mute"><i data-lucide="mic-off"></i></button>
    <button class="a-btn" aria-label="Hold"><i data-lucide="pause"></i></button>
    <button class="a-btn red" aria-label="End call"><i data-lucide="phone-off"></i></button>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
