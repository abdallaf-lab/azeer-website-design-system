<!--
  Storybook iframe head — fonts must be loaded inside the iframe (not the
  Storybook manager shell), since previews render in a separate document.

  Loads the same three families and weights as the playground:
    Inter (Latin)        — --font-sans     · 400 / 500 / 600
    IBM Plex Sans Arabic — --font-arabic   · 400 / 500 / 600
    JetBrains Mono       — --font-mono     · 400 / 500
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
/>
